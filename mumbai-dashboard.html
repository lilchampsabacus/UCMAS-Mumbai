<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Dashboard - CBS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #f95d6a 0%, #ffffff 50%, #2f3c88 100%);
            background-attachment: fixed;
            color: #333;
            min-height: 100vh;
        }

        /* Glassmorphism CSS */
        .glass-panel {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.15);
        }

        .header {
            padding: 20px 40px; 
            display: flex; 
            justify-content: space-between;
            align-items: center;
            border-radius: 0 0 16px 16px;
            margin-bottom: 30px;
            color: #2f3c88;
        }

        .header a {
            color: #2f3c88;
            text-decoration: none; 
            font-weight: bold;
        }

        .container { 
            padding: 0 40px; 
            max-width: 1400px;
            margin: auto;
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: #2f3c88;
        }

        .stats-grid {
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px; 
            margin-bottom: 40px;
        }

        .stat-card {
            padding: 20px; 
            text-align: center; 
            color: #2f3c88;
            transition: transform 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-card h3 { margin-top: 0; font-size: 1.1em; opacity: 0.9; font-weight: bold;}
        .stat-card h2 { margin-bottom: 0; font-size: 2.5em; font-weight: bold; }

        table {
            width: 100%; 
            border-collapse: collapse; 
            overflow: hidden;
            color: #333;
        }
        th, td { 
            padding: 16px; 
            text-align: left; 
            border-bottom: 1px solid rgba(0, 0, 0, 0.1); 
        }
        th { 
            background-color: rgba(47, 60, 136, 0.1); 
            font-weight: 600;
            color: #2f3c88;
        }
        tr:hover { background-color: rgba(255, 255, 255, 0.3); }

        /* Buttons */
        .btn {
            padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; 
            font-weight: bold; color: white; transition: 0.3s;
        }
        .btn-primary { background-color: #f95d6a; box-shadow: 0 4px 15px rgba(249, 93, 106, 0.4); }
        .btn-primary:hover { background-color: #e04a57; }
        .btn-toggle { padding: 6px 12px; font-size: 0.9em; }
        .btn-enable { background-color: rgba(40, 167, 69, 0.9); }
        .btn-disable { background-color: rgba(220, 53, 69, 0.9); }

        /* Modal Styles */
        .modal {
            display: none; position: fixed; z-index: 100; left: 0; top: 0;
            width: 100%; height: 100%; overflow: auto;
            background-color: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            align-items: center; justify-content: center;
        }
        .modal-content {
            padding: 30px; width: 100%; max-width: 400px;
            color: #2f3c88;
            background: rgba(255, 255, 255, 0.85); /* Slightly less transparent for readability */
        }
        .modal-content h3 { margin-top: 0; border-bottom: 1px solid rgba(47, 60, 136, 0.2); padding-bottom: 10px;}
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.9em; font-weight: bold;}
        .form-group input {
            width: 100%; padding: 10px; border-radius: 6px; box-sizing: border-box;
            border: 1px solid #ccc;
            background: white;
            color: #333;
        }
        .form-group input:focus { outline: none; border-color: #2f3c88; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;}
        .btn-cancel { background: #ccc; color: #333;}
        .btn-cancel:hover { background: #bbb; }
    </style>
</head>
<body>

<div class="glass-panel header" style="border-radius: 0 0 16px 16px;">
    <h2 style="margin: 0;">CBS Mumbai Master Franchise</h2>
    <a href="index.html">Logout</a>
</div>

<div class="container">
    <div class="stats-grid">
        <div class="glass-panel stat-card"><h3>Total UFs</h3><h2 id="totalUf">1</h2></div>
        <div class="glass-panel stat-card"><h3>Total Students</h3><h2 id="totalStudents">120</h2></div>
        <div class="glass-panel stat-card"><h3>Active Students</h3><h2 id="activeStudents">115</h2></div>
        <div class="glass-panel stat-card"><h3>Dropouts</h3><h2 id="dropouts">5</h2></div>
    </div>

    <div class="action-bar">
        <h3 style="margin: 0;">Unit Franchise Management</h3>
        <button class="btn btn-primary" onclick="openModal()">+ Add New UF</button>
    </div>

    <div class="glass-panel" style="margin-bottom: 50px; background: rgba(255, 255, 255, 0.5);">
        <table>
            <thead>
                <tr>
                    <th>UF Name</th>
                    <th>Code</th>
                    <th>Area</th>
                    <th>Students</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="ufTableBody">
                <tr>
                    <td>Demo Center Andheri</td>
                    <td>UF-AND-01</td>
                    <td>Andheri East</td>
                    <td>120</td>
                    <td><span style="color: #28a745; font-weight: bold;">Active</span></td>
                    <td><button class="btn btn-toggle btn-disable">Disable</button></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<div id="addUfModal" class="modal">
    <div class="glass-panel modal-content">
        <h3>Create New Unit Franchise</h3>
        
        <div class="form-group">
            <label>Franchise Name</label>
            <input type="text" id="newUfName" placeholder="e.g. Borivali Central">
        </div>
        <div class="form-group">
            <label>Franchise Code</label>
            <input type="text" id="newUfCode" placeholder="e.g. MH238">
        </div>
        <div class="form-group">
            <label>Area</label>
            <input type="text" id="newUfArea" placeholder="e.g. Borivali West">
        </div>

        <div class="modal-actions">
            <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" onclick="submitNewUF()">Create Franchise</button>
        </div>
    </div>
</div>

<script>
    // Supabase initialization
    const supabaseUrl = 'https://jugzuutcnxcipoyawhbq.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1Z3p1dXRjbnhjaXBveWF3aGJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2Mjg5OTgsImV4cCI6MjA5MTIwNDk5OH0.HzkuDQ8Yi5rq5ZP95xx8oxC1GCNcUr1kGs5F-psu95I';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    // Modal Logic
    const modal = document.getElementById("addUfModal");
    function openModal() { modal.style.display = "flex"; }
    function closeModal() { modal.style.display = "none"; }

    window.onclick = function(event) {
        if (event.target == modal) { closeModal(); }
    }

    // Real Supabase Submission Logic
    async function submitNewUF() {
        const name = document.getElementById('newUfName').value;
        const code = document.getElementById('newUfCode').value;
        const area = document.getElementById('newUfArea').value;

        if(!name || !code || !area) {
            alert("Please fill in all required fields.");
            return;
        }

        // Auto-generate credentials based on Franchise Code
        const generatedEmail = `${code.toLowerCase().replace(/\s+/g, '')}@cbs.in`;
        const generatedPassword = "Welcome@123";

        const btn = document.querySelector('.modal-actions .btn-primary');
        const originalText = btn.innerText;
        btn.innerText = "Creating...";

        try {
            // ACTUAL SUPABASE BACKEND CALL
            const { data, error } = await supabase.auth.signUp({
                email: generatedEmail,
                password: generatedPassword,
            });

            if (error) {
                // Friendly error handling instead of technical database jargon
                if (error.message.includes("already registered") || error.status === 422) {
                    alert("User already existed.");
                } else {
                    alert("An issue occurred while creating the franchise. Please try again.");
                }
                return;
            }

            // Show generated credentials
            alert(`Franchise created successfully!\n\nLogin Email: ${generatedEmail}\nDefault Password: ${generatedPassword}`);
            
            closeModal();
            
            // Clear fields
            document.getElementById('newUfName').value = '';
            document.getElementById('newUfCode').value = '';
            document.getElementById('newUfArea').value = '';

        } catch (error) {
            alert("An issue occurred while creating the franchise. Please try again.");
        } finally {
            btn.innerText = originalText;
        }
    }
</script>
</body>
</html>
