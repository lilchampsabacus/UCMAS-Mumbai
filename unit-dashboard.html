<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Dashboard - CBS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            /* Matching background from index and master dashboard */
            background: linear-gradient(135deg, #f95d6a 0%, #ffffff 50%, #2f3c88 100%);
            background-attachment: fixed;
            color: #333;
            min-height: 100vh;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.15);
        }

        .header {
            padding: 20px 40px; 
            display: flex; 
            justify-content: space-between;
            align-items: center;
            border-radius: 0 0 16px 16px;
            margin-bottom: 30px;
            color: #2f3c88;
        }

        .header a { color: #2f3c88; text-decoration: none; font-weight: bold; margin-left: 20px;}
        .header a:hover { text-decoration: underline; }

        .container { padding: 0 40px; max-width: 1200px; margin: auto; }

        /* Tabs Styling */
        .tab-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.3);
            padding: 10px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 12px 24px;
            font-size: 1.05em;
            font-weight: bold;
            color: #2f3c88;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }
        .tab-btn:hover { background: rgba(255, 255, 255, 0.5); }
        .tab-btn.active {
            background: #2f3c88;
            color: white;
            box-shadow: 0 4px 10px rgba(47, 60, 136, 0.3);
        }

        /* Tab Content Styling */
        .tab-content {
            display: none; /* Hidden by default */
            animation: fadeIn 0.4s ease-in-out;
        }
        .tab-content.active { display: block; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-section { 
            background: rgba(255, 255, 255, 0.85); /* Slightly opaque for readability */
            padding: 30px; 
            border-radius: 16px; 
            margin-bottom: 30px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.1); 
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        h3 { border-bottom: 2px solid rgba(47, 60, 136, 0.1); padding-bottom: 10px; color: #2f3c88; margin-top: 0;}
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        input, select { 
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box;
            background: white; color: #333; font-family: inherit;
        }
        input:focus, select:focus { outline: none; border-color: #2f3c88; box-shadow: 0 0 5px rgba(47, 60, 136, 0.3); }
        
        button.action-btn { 
            background-color: #f95d6a; color: white; border: none; font-weight: bold; cursor: pointer; 
            margin-top: 20px; padding: 12px; border-radius: 8px; font-size: 1.05em; transition: 0.3s;
            width: 100%;
            box-shadow: 0 4px 15px rgba(249, 93, 106, 0.4);
        }
        button.action-btn:hover { background-color: #e04a57; }
        button.action-btn.blue { background-color: #2f3c88; box-shadow: 0 4px 15px rgba(47, 60, 136, 0.4); }
        button.action-btn.blue:hover { background-color: #1f285e; }

    </style>
</head>
<body>

<div class="glass-panel header" style="border-radius: 0 0 16px 16px;">
    <h2 style="margin: 0;">Unit Franchise Dashboard</h2>
    <nav>
        <a href="payment-tracker.html">Payment Tracker</a>
        <a href="index.html">Logout</a>
    </nav>
</div>

<div class="container">
    
    <div class="tab-bar">
        <button class="tab-btn active" onclick="openTab(event, 'tab-students')">Student Registration</button>
        <button class="tab-btn" onclick="openTab(event, 'tab-instructors')">Course Instructors</button>
        <button class="tab-btn" onclick="openTab(event, 'tab-batches')">Batch Management</button>
    </div>

    <div id="tab-students" class="tab-content active">
        <div class="form-section">
            <h3>Add New Student</h3>
            <div class="grid-2">
                <input type="text" id="stuFirstName" placeholder="Student First Name" required>
                <input type="text" id="stuLastName" placeholder="Student Last Name" required>
                <input type="date" id="stuDob" required title="Date of Birth">
                <select id="stuGender">
                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
                <input type="text" id="stuStandard" placeholder="Standard (e.g. 5th Grade)">
                <input type="text" id="stuSchool" placeholder="School Name">
                <input type="text" id="fatherName" placeholder="Father's Name">
                <input type="tel" id="fatherMobile" placeholder="Father's Mobile No.">
                <input type="text" id="motherName" placeholder="Mother's Name">
                <input type="tel" id="motherMobile" placeholder="Mother's Mobile No.">
            </div>
            <button class="action-btn" onclick="registerStudent()">Register Student & Generate ID</button>
            <p id="generatedIdDisplay" style="color: #28a745; font-weight: bold; text-align: center; margin-top: 20px; font-size: 1.2em;"></p>
        </div>
    </div>

    <div id="tab-instructors" class="tab-content">
        <div class="form-section">
            <h3>Course Instructor (CI) Creation</h3>
            <div class="grid-2">
                <input type="text" id="ciName" placeholder="Instructor Full Name">
                <input type="text" id="ciCode" placeholder="Instructor Code (e.g. CI-01)">
                <input type="tel" id="ciMobile" placeholder="Mobile Number">
            </div>
            <button class="action-btn blue" onclick="addInstructor()">Assign Instructor to UF</button>
        </div>
    </div>

    <div id="tab-batches" class="tab-content">
        <div class="form-section">
            <h3>Batch Creation</h3>
            <div class="grid-2">
                <select id="batchDay">
                    <option value="">Select Batch Day</option>
                    <option value="Monday">Monday</option>
                    <option value="Saturday">Saturday</option>
                    <option value="Sunday">Sunday</option>
                </select>
                <input type="time" id="batchTime" title="Batch Time">
                <select id="batchLevel">
                    <option value="">Select Level</option>
                    <option value="Foundation">Foundation</option>
                    <option value="Level 1">Level 1</option>
                    <option value="Level 2">Level 2</option>
                </select>
                <input type="date" id="startDate" title="Start Date">
                <select id="assignCi">
                    <option value="">Assign Course Instructor</option>
                    <option value="CI-01">Nikhil Kamble (Demo)</option>
                </select>
            </div>
            <button class="action-btn blue" onclick="createBatch()">Create Batch</button>
        </div>
    </div>

</div>

<script>
    // Supabase Initialization
    const supabaseUrl = 'https://jugzuutcnxcipoyawhbq.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1Z3p1dXRjbnhjaXBveWF3aGJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2Mjg5OTgsImV4cCI6MjA5MTIwNDk5OH0.HzkuDQ8Yi5rq5ZP95xx8oxC1GCNcUr1kGs5F-psu95I';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    // --- Tab Navigation Logic ---
    function openTab(evt, tabId) {
        // Hide all tab contents
        const tabContents = document.getElementsByClassName("tab-content");
        for (let i = 0; i < tabContents.length; i++) {
            tabContents[i].classList.remove("active");
        }
        // Remove active class from all buttons
        const tabBtns = document.getElementsByClassName("tab-btn");
        for (let i = 0; i < tabBtns.length; i++) {
            tabBtns[i].classList.remove("active");
        }
        // Show current tab and add active class to button
        document.getElementById(tabId).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    // --- Student Registration Logic ---
    async function registerStudent() {
        try {
            const fName = document.getElementById('stuFirstName').value;
            const lName = document.getElementById('stuLastName').value;
            const dob = document.getElementById('stuDob').value;
            
            if(!fName || !lName || !dob) {
                alert("Please fill in the student's First Name, Last Name, and Date of Birth at minimum.");
                return;
            }

            // ID Generation Logic (e.g., kk02170001)
            const letter1 = fName.charAt(0).toLowerCase();
            const letter2 = lName.charAt(0).toLowerCase(); 
            const dateObj = new Date(dob);
            const day = String(dateObj.getDate()).padStart(2, '0');
            const yearStr = String(dateObj.getFullYear()).slice(-2);
            
            const prefix = `${letter1}${letter2}${day}${yearStr}`;
            
            // Demo logic for sequence number (In production, query DB for max sequence of this prefix)
            let sequence = 1; 
            const newUniqueId = `${prefix}${String(sequence).padStart(4, '0')}`;

            document.getElementById('generatedIdDisplay').innerText = `✅ Student successfully registered! Unique ID: ${newUniqueId}`;
            
        } catch (error) {
            alert("An issue occurred while saving the details. Please try again.");
        }
    }

    function addInstructor() { 
        alert("Instructor successfully assigned to your franchise."); 
    }
    
    function createBatch() { 
        alert("Batch successfully created."); 
    }
</script>
</body>
</html>
