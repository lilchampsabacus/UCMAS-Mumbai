<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBS Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f95d6a 0%, #ffffff 50%, #2f3c88 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }
        .login-box h2 {
            color: #2f3c88;
            margin-bottom: 20px;
        }
        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        
        .password-container {
            position: relative;
            width: 100%;
        }
        .password-container input {
            padding-right: 40px; 
        }
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
            user-select: none;
        }

        button.login-btn {
            background-color: #2f3c88;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
        }
        button.login-btn:hover {
            background-color: #1f285e;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>CBS Portal Login</h2>
    <input type="email" id="email" placeholder="Email Address" required>
    
    <div class="password-container">
        <input type="password" id="password" placeholder="Password" required>
        <span class="toggle-password" id="toggleIcon" onclick="togglePasswordVisibility()">👁️</span>
    </div>

    <select id="role">
        <option value="mumbai-dashboard.html">Master Franchise</option>
        <option value="unit-dashboard.html">Unit Franchise (UF)</option>
    </select>
    <button class="login-btn" onclick="handleLogin()">Login</button>
</div>

<script>
    // 1. Initialize Supabase
    const supabaseUrl = 'https://jugzuutcnxcipoyawhbq.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1Z3p1dXRjbnhjaXBveWF3aGJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2Mjg5OTgsImV4cCI6MjA5MTIwNDk5OH0.HzkuDQ8Yi5rq5ZP95xx8oxC1GCNcUr1kGs5F-psu95I';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    // 2. Function to toggle password visibility
    function togglePasswordVisibility() {
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.getElementById('toggleIcon');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.textContent = '🙈'; 
        } else {
            passwordInput.type = 'password';
            toggleIcon.textContent = '👁️'; 
        }
    }

    // 3. Define the login function
    async function handleLogin() {
        const emailInput = document.getElementById('email').value;
        const passwordInput = document.getElementById('password').value;
        const targetPage = document.getElementById('role').value;

        if (!emailInput || !passwordInput) {
             alert("Please enter both email and password to continue.");
             return;
        }

        try {
            const { data, error } = await supabase.auth.signInWithPassword({
                email: emailInput,
                password: passwordInput,
            });

            if (error) {
                alert("Login failed. Please check your email and password and try again.");
            } else {
                window.location.href = targetPage;
            }
        } catch (err) {
            alert("An unexpected error occurred. Please try again.");
        }
    }
</script>
</body>
</html>
